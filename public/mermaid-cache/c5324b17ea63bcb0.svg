mal edge-pattern-dotted flowchart-link LS-IPv4 LE-Comparison" style="fill:none;stroke-width:2px;stroke-dasharray:3;" marker-end="url(#mermaid-1772557692320_flowchart-pointEnd)"></path><path d="M843.266,553.367L847.432,556.639C851.599,559.912,859.932,566.456,868.266,597.978C876.599,629.5,884.932,686,893.266,714.25C901.599,742.5,909.932,742.5,917.383,742.339C924.834,742.178,931.403,741.856,934.688,741.695L937.972,741.534" id="L-IPv6-Comparison-0" class=" edge-thickness-normal edge-pattern-dotted flowchart-link LS-IPv6 LE-Comparison" style="fill:none;stroke-width:2px;stroke-dasharray:3;" marker-end="url(#mermaid-1772557692320_flowchart-pointEnd)"></path><path d="M1301.141,732.5L1305.307,732.5C1309.474,732.5,1317.807,732.5,1326.141,732.5C1334.474,732.5,1342.807,732.5,1351.141,732.5C1359.474,732.5,1367.807,732.5,1375.257,732.5C1382.707,732.5,1389.274,732.5,1392.557,732.5L1395.841,732.5" id="L-Comparison-Impact-0" class=" edge-thickness-normal edge-pattern-dotted flowchart-link LS-Comparison LE-Impact" style="fill:none;stroke-width:2px;stroke-dasharray:3;" marker-end="url(#mermaid-1772557692320_flowchart-pointEnd)"></path><path d="M322.266,148.93L326.432,141.275C330.599,133.62,338.932,118.31,354.469,110.655C370.005,103,392.745,103,415.484,103C438.224,103,460.964,103,504.38,103C547.797,103,611.891,103,675.984,103C740.078,103,804.172,103,840.385,103C876.599,103,884.932,103,893.266,103C901.599,103,909.932,103,920.075,104.846C930.218,106.692,942.171,110.385,948.147,112.231L954.124,114.077" id="L-IPv4-Protocols-0" class=" edge-thickness-normal edge-pattern-dotted flowchart-link LS-IPv4 LE-Protocols" style="fill:none;stroke-width:2px;stroke-dasharray:3;" marker-end="url(#mermaid-1772557692320_flowchart-pointEnd)"></path><path d="M843.266,338.047L847.432,335.956C851.599,333.864,859.932,329.682,868.266,327.591C876.599,325.5,884.932,325.5,893.266,325.5C901.599,325.5,909.932,325.5,920.223,320.71C930.515,315.92,942.764,306.34,948.888,301.55L955.013,296.76" id="L-IPv6-Protocols-0" class=" edge-thickness-normal edge-pattern-dotted flowchart-link LS-IPv6 LE-Protocols" style="fill:none;stroke-width:2px;stroke-dasharray:3;" marker-end="url(#mermaid-1772557692320_flowchart-pointEnd)"></path></g><g class="edgeLabels"><g class="edgeLabel" transform="translate(415.484375, 422)"><g class="label" transform="translate(-43.21875, -9.5)"><foreignObject width="86.4375" height="19"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel">Evolution to</span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default default flowchart-label" id="flowchart-Protocols-4" data-node="true" data-id="Protocols" transform="translate(1122.203125, 166)"><rect class="basic label-container" style="fill:#fff4e6;" rx="0" ry="0" x="-163.015625" y="-131" width="326.03125" height="262"></rect><g class="label" style="" transform="translate(-155.515625, -123.5)"><rect></rect><foreignObject width="311.03125" height="247"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="nodeLabel">Common Protocol/Next Header Values:<br><br>• 1 = ICMP (IPv4) / ICMPv6 (IPv6)<br>• 6 = TCP (Transmission Control Protocol)<br>• 17 = UDP (User Datagram Protocol)<br>• 41 = IPv6 encapsulation (6in4 tunnel)<br>• 43 = Routing Header (IPv6 extension)<br>• 44 = Fragment Header (IPv6 extension)<br>• 50 = ESP (Encapsulating Security Payload)<br>• 51 = AH (Authentication Header)<br>• 58 = ICMPv6<br>• 89 = OSPF (Open Shortest Path First)<br>• 132 = SCTP (Stream Control Transmission)</span></div></foreignObject></g></g><g class="node default default flowchart-label" id="flowchart-Impact-3" data-node="true" data-id="Impact" transform="translate(1568.6328125, 732.5)"><rect class="basic label-container" style="fill:#f3e5f5;" rx="0" ry="0" x="-167.4921875" y="-197.5" width="334.984375" height="395"></rect><g class="label" style="" transform="translate(-159.9921875, -190)"><rect></rect><foreignObject width="319.984375" height="380"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="nodeLabel">Router Processing Efficiency:<br><br>IPv4 Processing:<br>• Variable header length (check IHL)<br>• Calculate/verify checksum (CPU intensive)<br>• Handle fragmentation at each hop<br>• Parse variable options field<br><br>IPv6 Processing:<br>• Fixed 40-byte header (predictable)<br>• No checksum verification needed<br>• No fragmentation handling<br>• Extension headers only at destination<br>• Result: Faster forwarding decisions<br><br>Performance Benefits:<br>→ Reduced router CPU load<br>→ Higher throughput<br>→ Simplified hardware design<br>→ Better scalability</span></div></foreignObject></g></g><g class="node default default flowchart-label" id="flowchart-Comparison-2" data-node="true" data-id="Comparison" transform="translate(1122.203125, 732.5)"><rect class="basic label-container" style="fill:#fff9c4;" rx="0" ry="0" x="-178.9375" y="-207" width="357.875" height="414"></rect><g class="label" style="" transform="translate(-171.4375, -199.5)"><rect></rect><foreignObject width="342.875" height="399"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="nodeLabel">IPv4 → IPv6 Field Evolution:<br><br>Equivalent Fields:<br>• Version (4 bits) → Version (4 bits)<br>• DSCP/ToS (8 bits) → Traffic Class (8 bits)<br>• TTL (8 bits) → Hop Limit (8 bits)<br>• Protocol (8 bits) → Next Header (8 bits)<br>• Source/Dest IP (32b) → Source/Dest IP (128b)<br><br>Removed in IPv6:<br>✗ IHL (Header Length) - Fixed length<br>✗ Identification, Flags, Fragment Offset<br>✗ Header Checksum - Redundant<br>✗ Options - Moved to Extension Headers<br><br>New in IPv6:<br>✓ Flow Label - QoS traffic flows<br>✓ Extension Headers - Modular options<br>✓ Simplified processing - No checksum<br>✓ Larger address space - 128-bit<br>✓ Built-in IPSec support</span></div></foreignObject></g></g><g class="node default default flowchart-label" id="flowchart-IPv6-1" data-node="true" data-id="IPv6" transform="translate(675.984375, 422)"><rect class="basic label-container" style="fill:#f1f8e9;" rx="0" ry="0" x="-167.28125" y="-264" width="334.5625" height="528"></rect><g class="label" style="" transform="translate(-159.78125, -256.5)"><rect></rect><foreignObject width="319.5625" height="513"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="nodeLabel">IPv6 Packet Header Fields:<br><br>--------------------------------------<br>- Version(4b) - Traffic Class(8b) -<br>----------------------------------------<br>- Flow Label (20 bits) -<br>----------------------------------------<br>- Payload Length (16 bits) -<br>----------------------------------------<br>- Next Header (8b) - Hop Limit (8b) -<br>----------------------------------------<br>- Source IPv6 Address (128 bits) -<br>----------------------------------------<br>- Source IPv6 Address (continued) -<br>----------------------------------------<br>- Destination IPv6 Address (128 bits) -<br>----------------------------------------<br>- Destination IPv6 Address (continued) -<br>--------------------------------------<br><br>Key Characteristics:<br>• Size: 40 bytes (fixed, no options)<br>• Fixed header length (simplified)<br>• No header checksum (faster processing)<br>• No router fragmentation (end-to-end only)<br>• Extension headers (optional)<br>• 128-bit addresses (340 undecillion)</span></div></foreignObject></g></g><g class="node default default flowchart-label" id="flowchart-IPv4-0" data-node="true" data-id="IPv4" transform="translate(173.6328125, 422)"><rect class="basic label-container" style="fill:#e3f2fd;" rx="0" ry="0" x="-148.6328125" y="-283" width="297.265625" height="566"></rect><g class="label" style="" transform="translate(-141.1328125, -275.5)"><rect></rect><foreignObject width="282.265625" height="551"><div xmlns="http://www.w3.org/1999/xhtml" style="display: inline-block; white-space: nowrap;"><span class="nodeLabel">IPv4 Packet Header Fields:<br><br>--------------------------------------<br>- Version(4b) - IHL(4b) - DSCP/ToS(8b) -<br>----------------------------------------<br>- Total Length (16 bits) -<br>----------------------------------------<br>- Identification (16 bits) -<br>----------------------------------------<br>- Flags(3b) - Fragment Offset(13b) -<br>----------------------------------------<br>- Time to Live (8b) - Protocol (8b) -<br>----------------------------------------<br>- Header Checksum (16 bits) -<br>----------------------------------------<br>- Source IP Address (32 bits) -<br>----------------------------------------<br>- Destination IP Address (32 bits) -<br>----------------------------------------<br>- Options (variable, 0-40 bytes) -<br>--------------------------------------<br><br>Key Characteristics:<br>• Size: 20 bytes (without options)<br>• Variable header length (IHL field)<br>• Header checksum required<br>• Fragmentation by routers allowed<br>• Options field (rarely used)<br>• 32-bit addresses (4 billion addresses)</span></div></foreignObject></g></g></g></g></g></svg>